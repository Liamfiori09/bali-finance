<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bali Finance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --a:#0D9488;--al:#CCFBF1;--at:#0D948818;
  --go:#D97706;--gl:#FEF3C7;
  --re:#DC2626;--rl:#FEE2E2;
  --gr:#059669;--grl:#D1FAE5;
  --bl:#2563EB;--bll:#DBEAFE;
  --pk:#DB2777;--pkl:#FCE7F3;
  --pu:#7C3AED;--pul:#EDE9FE;
  --bg:#ffffff;--s:#F8FAFC;--s2:#F1F5F9;
  --tx:#0F172A;--t2:#64748B;--t3:#94A3B8;
  --br:#E2E8F0;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0F172A;--s:#1E293B;--s2:#273548;
  --tx:#F1F5F9;--t2:#94A3B8;--t3:#64748B;
  --br:#1E293B;
  --al:#0D948830;--at:#0D948820;
  --gl:#D9770620;--rl:#DC262620;--grl:#05906920;
  --bll:#2563EB20;--pkl:#DB277720;--pul:#7C3AED20;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;min-height:100dvh;overscroll-behavior:none}
#app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative;display:flex;flex-direction:column}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px}
.spin{width:32px;height:32px;border:2px solid var(--br);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Login */
#login{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:90}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:26px;font-weight:700;color:var(--tx);margin-bottom:4px}
.login-sub{font-size:14px;color:var(--t2);margin-bottom:48px}
.profile-btn{width:100%;max-width:320px;padding:18px 24px;border-radius:18px;border:1px solid var(--br);background:var(--s);cursor:pointer;display:flex;align-items:center;gap:16px;margin-bottom:12px;transition:border-color .15s}
.profile-btn:active{transform:scale(.98)}
.profile-av{width:50px;height:50px;border-radius:25px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.profile-info{text-align:left}
.profile-name{font-size:17px;font-weight:600;color:var(--tx)}
.profile-sub{font-size:13px;color:var(--t2);margin-top:2px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--bg);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:40}
.hdr-brand{font-size:15px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--a)}
.av-btn{width:34px;height:34px;border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:none;letter-spacing:.02em}

/* Tabs */
.tabs-bar{background:var(--bg);border-bottom:1px solid var(--br);position:sticky;top:57px;z-index:39;overflow-x:auto}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;padding:0 20px;white-space:nowrap}
.tab-btn{padding:12px 0;margin-right:24px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--t2);border-bottom:2.5px solid transparent;transition:color .15s}
.tab-btn.on{color:var(--a);border-bottom-color:var(--a)}

/* Main content */
.pg{padding:20px;padding-bottom:90px;flex:1;overflow-y:auto}

/* Hero */
.hero{background:var(--s);border-radius:22px;padding:24px;margin-bottom:16px}
.hero-lbl{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.hero-amt{font-size:42px;font-weight:700;line-height:1;letter-spacing:-.03em;font-variant-numeric:tabular-nums;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--t2);margin-bottom:18px}

/* Progress */
.pb{background:var(--br);border-radius:99px;overflow:hidden}
.pb-f{border-radius:99px;transition:width .6s ease}
.pb-row{display:flex;align-items:center;gap:10px}

/* Cards */
.card{background:var(--bg);border:1px solid var(--br);border-radius:18px;padding:18px 20px;margin-bottom:12px}
.card-s{background:var(--s);border:none;border-radius:18px;padding:18px 20px;margin-bottom:12px}

/* Section label */
.slbl{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin:20px 0 10px}

/* List rows */
.lrow{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--br)}
.lrow:last-child{border-bottom:none;padding-bottom:0}
.lrow:first-child{padding-top:0}
.lic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ltx{flex:1;min-width:0}
.ltx-t{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ltx-s{font-size:12px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.lamt{text-align:right;flex-shrink:0}
.lamt-t{font-weight:700;font-variant-numeric:tabular-nums;font-size:15px}
.lamt-s{font-size:11px;color:var(--t3);margin-top:2px;font-variant-numeric:tabular-nums}

/* Chips */
.chip{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.chip-a{background:var(--at);color:var(--a)}
.chip-g{background:var(--grl);color:var(--gr)}

/* Selectable pills */
.sel{padding:8px 16px;border-radius:99px;border:1px solid transparent;font-size:13px;font-weight:600;cursor:pointer;background:none;font-family:inherit;transition:all .12s}
.sel.on{background:var(--at);border-color:var(--a);color:var(--a)}
.sel.off{background:var(--s);color:var(--t2)}

/* Selectable cards */
.scard{border:1px solid var(--br);border-radius:14px;padding:14px 16px;cursor:pointer;background:var(--bg);flex:1}
.scard.on{border-color:var(--a);background:var(--at)}
.scard.on .sc-t{color:var(--a)}
.sc-t{font-weight:600;font-size:14px;color:var(--tx)}
.sc-s{font-size:12px;color:var(--t3);margin-top:3px}

/* Icon picker */
.ico-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ico-btn{width:44px;height:44px;border-radius:12px;font-size:22px;border:1px solid var(--br);background:var(--s);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ico-btn.on{border-color:var(--a);background:var(--at)}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--br);display:flex;padding:10px 0 16px;z-index:40}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit}
.ni-i{font-size:22px;position:relative}
.ni-l{font-size:10px;font-weight:600;color:var(--t3)}
.ni.on .ni-l{color:var(--a)}
.ni-dot{width:4px;height:4px;border-radius:2px;background:var(--a);margin:0 auto}
.bdg{position:absolute;top:-3px;right:-7px;background:var(--re);color:#fff;font-size:9px;border-radius:99px;padding:1px 5px;min-width:15px;text-align:center;font-weight:700}

/* FAB */
.fab{width:52px;height:52px;border-radius:26px;background:var(--a);color:#fff;font-size:28px;border:none;cursor:pointer;position:fixed;bottom:80px;right:max(16px, calc(50% - 215px + 16px));z-index:41;display:flex;align-items:center;justify-content:center;font-weight:300;box-shadow:0 4px 16px rgba(13,148,136,.35)}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:flex;align-items:flex-end}
.sh{background:var(--bg);border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-height:92dvh;overflow-y:auto;max-width:430px;margin:0 auto}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.sh-title{font-size:18px;font-weight:700}
.sh-x{background:var(--s);border:none;width:30px;height:30px;border-radius:15px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--t2)}

/* Forms */
input,select{background:var(--s);border:1px solid var(--br);border-radius:12px;padding:13px 16px;color:var(--tx);font-size:15px;font-family:inherit;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--a)}
.fi{margin-bottom:12px}
.fi-l{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.btn{padding:15px;border-radius:14px;border:none;cursor:pointer;font-size:15px;font-weight:700;width:100%;font-family:inherit;transition:opacity .12s}
.btn:active{opacity:.85}
.btn-p{background:var(--a);color:#fff}
.btn-s{background:var(--s);color:var(--t2);border:1px solid var(--br)}
.dv{border:none;border-top:1px solid var(--br);margin:16px 0}

/* Alert */
.alert{border-radius:14px;padding:14px 16px;font-size:13px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.alert-y{background:var(--gl);color:var(--go)}

/* Balance pill */
.balpill{border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:16px}

/* Reminder card */
.rem-card{background:var(--bg);border:1px solid var(--br);border-radius:18px;padding:18px;margin-bottom:12px}
.rem-card.urg{border-color:var(--go)}
.rem-card.ovd{border-color:var(--re)}

/* Sync indicator */
#sync{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:6px 16px;border-radius:99px;font-size:12px;font-weight:600;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
#sync.show{opacity:1}

/* Error */
.err-banner{background:var(--rl);color:var(--re);padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:12px;font-weight:500}
</style>
</head>
<body>

<div id="app">
  <!-- Loading -->
  <div id="loading">
    <div style="font-size:42px;margin-bottom:4px">🌴</div>
    <div style="font-size:18px;font-weight:700;color:var(--tx)">Bali Finance</div>
    <div class="spin" style="margin-top:16px"></div>
  </div>

  <!-- Login -->
  <div id="login" style="display:none">
    <div class="login-logo">🌴</div>
    <div class="login-title">Bali Finance</div>
    <div class="login-sub">Elige tu perfil</div>
    <div id="login-profiles"></div>
  </div>

  <!-- Main app (hidden until logged in) -->
  <div id="main" style="display:none;flex-direction:column;min-height:100dvh">
    <div class="hdr">
      <div class="hdr-brand"><div class="hdr-dot"></div>Bali Finance</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="hmo" style="font-size:12px;color:var(--t3)"></span>
        <button class="av-btn" id="hav" onclick="logout()"></button>
      </div>
    </div>
    <div class="tabs-bar"><div class="tabs-inner" id="tabs"></div></div>
    <div id="vw" class="pg" style="padding-bottom:90px"></div>
    <div class="nav" id="nav"></div>
    <button class="fab" id="fab" onclick="S.ofab()">+</button>
  </div>

  <div id="sync">Sincronizado ✓</div>
</div>

<!-- Modal container (outside #main so it covers everything) -->
<div id="mo" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG — Reemplaza estos dos valores con los de tu proyecto Supabase
// ─────────────────────────────────────────────────────────────────────────────
const SUPA_URL  = 'https://ugykvwfqpdogvdgczrjg.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVneWt2d2ZxcGRvZ3ZkZ2N6cmpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNzY4MzgsImV4cCI6MjA5Mjg1MjgzOH0.sk7vOoMBX9Hddp9g_6iibSA_WXYB5qlh-n6YpU9JyXg';
// ─────────────────────────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── State ──────────────────────────────────────────────────────────────────
let D = {
  user: null, tab: 'home',
  users: {
    liam:   { name:'Liam',   ini:'LI', col:'#D97706', bg:'#FEF3C7', inc:2000, email:'', rule:{needs:50,wants:30,saves:20} },
    marina: { name:'Marina', ini:'MA', col:'#DB2777', bg:'#FCE7F3', inc:1500, email:'', rule:{needs:50,wants:30,saves:20} },
  },
  exp:[], rem:[], inv:[],
  rates:{ IDR:17500, USD:1.08 },
};

// ── Helpers ────────────────────────────────────────────────────────────────
const G = e => document.getElementById(e);
const eu = (n,c) => c==='EUR'?+n : c==='IDR'?(+n)/D.rates.IDR : (+n)/D.rates.USD;
const ef = n => `€${Math.round(Math.abs(n))}`;
const cf = (n,c) => ({EUR:'€',IDR:'Rp ',USD:'$'}[c]||'')+n;
const efd = n => n<0?`-€${Math.round(Math.abs(n))}`:`€${Math.round(n)}`;
const td = () => new Date().toISOString().split('T')[0];
const mn = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const du = d => d ? Math.ceil((new Date(d)-new Date(td()))/86400000) : 999;
const amM = (d,n=1) => { const x=new Date(d); x.setMonth(x.getMonth()+n); return x.toISOString().split('T')[0]; };
const adD = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0]; };
const ndm = day => { const n=new Date(); let d=new Date(n.getFullYear(),n.getMonth(),day); if(d<=n) d=new Date(n.getFullYear(),n.getMonth()+1,day); return d.toISOString().split('T')[0]; };
const mySh = (e,uid) => e.type==='shared' ? eu(e.amt,e.cur)/2 : (e.uid===uid ? eu(e.amt,e.cur) : 0);

const CATS = [
  {id:'rent',  n:'Alquiler',  i:'🏠', t:'needs', c:'#2563EB', bg:'#DBEAFE'},
  {id:'food',  n:'Comida',    i:'🍜', t:'needs', c:'#059669', bg:'#D1FAE5'},
  {id:'trans', n:'Transporte',i:'🛵', t:'needs', c:'#7C3AED', bg:'#EDE9FE'},
  {id:'health',n:'Salud',     i:'🏥', t:'needs', c:'#DC2626', bg:'#FEE2E2'},
  {id:'fun',   n:'Ocio',      i:'🌴', t:'wants', c:'#0D9488', bg:'#CCFBF1'},
  {id:'shop',  n:'Compras',   i:'🛍', t:'wants', c:'#DB2777', bg:'#FCE7F3'},
  {id:'invest',n:'Inversión', i:'📈', t:'invest',c:'#0D9488', bg:'#CCFBF1'},
  {id:'other', n:'Otros',     i:'📦', t:'wants', c:'#64748B', bg:'#F1F5F9'},
];
const ICONS = ['🏠','🛵','🏥','💡','📱','🌐','🏋','🎵','🛂','🏦','🛍','🍜','🌴','⚡','💧','📦','🎓','🐕','🚿','🍿'];
const FREQS = [{v:'monthly',l:'Mensual'},{v:'bimonthly',l:'Cada 2 meses'},{v:'60days',l:'Cada 60 días'},{v:'yearly',l:'Anual'},{v:'once',l:'Una vez'}];
const TABS  = [{id:'home',l:'Inicio',i:'🏠'},{id:'exp',l:'Gastos',i:'💸'},{id:'fijos',l:'Fijos',i:'🔁'},{id:'inv',l:'Inversión',i:'📈'},{id:'cfg',l:'Ajustes',i:'⚙️'}];

// ── Sync flash ─────────────────────────────────────────────────────────────
const flashSync = () => { G('sync').classList.add('show'); setTimeout(()=>G('sync').classList.remove('show'),1800); };

// ── Load data from Supabase ────────────────────────────────────────────────
async function loadAll() {
  try {
    const [eR, rR, iR, sR, rtR] = await Promise.all([
      sb.from('expenses').select('*').order('date', {ascending:false}),
      sb.from('reminders').select('*'),
      sb.from('investments').select('*').order('date', {ascending:false}),
      sb.from('settings').select('*'),
      sb.from('rates').select('*').limit(1),
    ]);
    if (eR.data)  D.exp = eR.data.map(r=>({id:r.id,amt:r.amount,cur:r.currency,cat:r.category,desc:r.description,date:r.date,type:r.type,uid:r.user_id,fromReminder:r.from_reminder}));
    if (rR.data)  D.rem = rR.data.map(r=>({id:r.id,n:r.name,i:r.icon,amt:r.amount,cur:r.currency,nd:r.next_date,fr:r.frequency,cat:r.category,shared:r.shared}));
    if (iR.data)  D.inv = iR.data.map(r=>({id:r.id,uid:r.user_id,amt:r.amount,cur:r.currency,note:r.note,date:r.date}));
    if (sR.data)  sR.data.forEach(r => { if(D.users[r.user_id]) D.users[r.user_id] = {...D.users[r.user_id],name:r.name,ini:r.initials,col:r.color,bg:r.bg_color,inc:r.income,email:r.email||'',rule:{needs:r.rule_needs||50,wants:r.rule_wants||30,saves:r.rule_saves||20}}; });
    if (rtR.data?.[0]) D.rates = {IDR:rtR.data[0].idr, USD:rtR.data[0].usd};
  } catch(e) { console.error('Load error', e); }
}

// ── Real-time subscriptions ────────────────────────────────────────────────
function subscribeRealtime() {
  sb.channel('app-sync')
    .on('postgres_changes', {event:'*', schema:'public', table:'expenses'}, async () => {
      const {data} = await sb.from('expenses').select('*').order('date',{ascending:false});
      if(data) { D.exp = data.map(r=>({id:r.id,amt:r.amount,cur:r.currency,cat:r.category,desc:r.description,date:r.date,type:r.type,uid:r.user_id,fromReminder:r.from_reminder})); S.r(); flashSync(); }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'reminders'}, async () => {
      const {data} = await sb.from('reminders').select('*');
      if(data) { D.rem = data.map(r=>({id:r.id,n:r.name,i:r.icon,amt:r.amount,cur:r.currency,nd:r.next_date,fr:r.frequency,cat:r.category,shared:r.shared})); S.r(); flashSync(); }
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'investments'}, async () => {
      const {data} = await sb.from('investments').select('*').order('date',{ascending:false});
      if(data) { D.inv = data.map(r=>({id:r.id,uid:r.user_id,amt:r.amount,cur:r.currency,note:r.note,date:r.date})); S.r(); flashSync(); }
    })
    .subscribe();
}

// ── DB writes ──────────────────────────────────────────────────────────────
const DB = {
  async addExp(e) {
    await sb.from('expenses').insert({id:e.id,user_id:e.uid,amount:e.amt,currency:e.cur,category:e.cat,description:e.desc,date:e.date,type:e.type,from_reminder:e.fromReminder||false});
  },
  async addRem(r) {
    await sb.from('reminders').insert({id:r.id,name:r.n,icon:r.i,amount:r.amt,currency:r.cur,next_date:r.nd,frequency:r.fr,category:r.cat,shared:r.shared});
  },
  async updateRem(r) {
    await sb.from('reminders').update({next_date:r.nd}).eq('id',r.id);
  },
  async deleteRem(id) {
    await sb.from('reminders').delete().eq('id',id);
  },
  async addInv(i) {
    await sb.from('investments').insert({id:i.id,user_id:i.uid,amount:i.amt,currency:i.cur,note:i.note,date:i.date});
  },
  async saveSettings(uid, u) {
    await sb.from('settings').upsert({user_id:uid,name:u.name,initials:u.ini,color:u.col,bg_color:u.bg,income:u.inc,email:u.email,rule_needs:u.rule.needs,rule_wants:u.rule.wants,rule_saves:u.rule.saves});
    if(u._rates) await sb.from('rates').upsert({id:1,idr:u._rates.IDR,usd:u._rates.USD});
  },
};

// ── Actions ────────────────────────────────────────────────────────────────
const S = {
  go(t) { D.tab=t; S.r(); },
  ofab() { G('mo').innerHTML = D.tab==='fijos' ? rAddRem() : rAdd(); G('mo').style.display='flex'; },
  ca() { G('mo').innerHTML=''; G('mo').style.display='none'; },
  async ae(e) { D.exp.unshift(e); S.ca(); S.r(); await DB.addExp(e); },
  async ar(rem) { D.rem.push(rem); S.ca(); S.r(); await DB.addRem(rem); },
  async delR(id) {
    if(!confirm('¿Eliminar este gasto fijo?')) return;
    D.rem = D.rem.filter(x=>x.id!==id); S.r(); await DB.deleteRem(id);
  },
  op(id) { window._pw=D.user; const r=D.rem.find(x=>x.id===id); window._ps=r?.shared?'shared':'personal'; G('mo').innerHTML=rPayFlow(id); G('mo').style.display='flex'; },
  async cp(id) {
    const r=D.rem.find(x=>x.id===id); if(!r) return;
    const who=window._pw||D.user, split=window._ps||'shared';
    const exp={id:Date.now()+'',amt:r.amt,cur:r.cur,cat:r.cat||'other',desc:r.n,date:td(),type:split==='shared'?'shared':'personal',uid:who,fromReminder:true};
    D.exp.unshift(exp);
    let nd;
    if(r.fr==='monthly') nd=amM(r.nd);
    else if(r.fr==='60days') nd=adD(td(),60);
    else if(r.fr==='bimonthly') nd=amM(r.nd,2);
    else if(r.fr==='yearly') nd=amM(r.nd,12);
    else { D.rem=D.rem.filter(x=>x.id!==id); S.ca(); S.r(); await DB.addExp(exp); return; }
    r.nd=nd; S.ca(); S.r();
    await Promise.all([DB.addExp(exp), DB.updateRem(r)]);
  },
  async ai(v) { D.inv.unshift(v); S.r(); await DB.addInv(v); },
  async saveSettings(inc, email, rule, rates) {
    const u = {...D.users[D.user], inc, email, rule, _rates:rates};
    D.users[D.user] = {...u}; D.rates = rates; S.r();
    await DB.saveSettings(D.user, u);
  },
  r() {
    const u=D.users[D.user], mn2=mn();
    G('hmo').textContent=mn2;
    G('hav').textContent=u.ini; G('hav').style.background=u.bg; G('hav').style.color=u.col;
    const urg=D.rem.filter(r=>r.nd&&du(r.nd)<=7).length;
    G('tabs').innerHTML=TABS.map(t=>`<button class="tab-btn${D.tab===t.id?' on':''}" onclick="S.go('${t.id}')">${t.l}</button>`).join('');
    G('nav').innerHTML=TABS.map(t=>`<button class="ni${D.tab===t.id?' on':''}" onclick="S.go('${t.id}')"><div class="ni-i">${t.i}${t.id==='fijos'&&urg>0?`<span class="bdg">${urg}</span>`:''}</div><div class="ni-l">${t.l}</div>${D.tab===t.id?'<div class="ni-dot"></div>':''}</button>`).join('');
    const views={home:rHome,exp:rExp,fijos:rFijos,inv:rInv,cfg:rCfg};
    G('vw').innerHTML=(views[D.tab]||rHome)();
  }
};

    <div class="card">

  const me=D.user,u=D.users[me],m=mn();
  const myInv=D.inv.filter(i=>i.uid===me);
  const mt=myInv.filter(i=>i.date.startsWith(m)).reduce((s,i)=>s+eu(i.amt,i.cur),0);
  const at=myInv.reduce((s,i)=>s+eu(i.amt,i.cur),0);
  const goal=Math.round(u.inc*((u.rule?.saves||20)/100));
  const pct=Math.min(100,Math.round((mt/goal)*100)||0);
  return `
    <div style="margin-bottom:18px"><div style="font-size:22px;font-weight:700">Inversión</div><div style="font-size:13px;color:var(--t3);margin-top:3px">Personal · ${u.name}</div></div>
    <div class="hero">
      <div class="hero-lbl">Total acumulado</div>
      <div class="hero-amt" style="color:var(--a)">${ef(at)}</div>
      <div class="hero-sub">Este mes ${ef(mt)} · Meta ${ef(goal)}</div>
      <div class="pb-row"><div class="pb" style="flex:1;height:9px"><div class="pb-f" style="width:${pct}%;height:9px;background:var(--a)"></div></div><span style="font-size:13px;font-weight:700;color:var(--a);min-width:36px;text-align:right;font-variant-numeric:tabular-nums">${pct}%</span></div>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:16px">Nueva aportación</div>
      <div style="display:flex;gap:10px;margin-bottom:10px"><input type="number" id="ia" placeholder="0.00" style="font-size:22px;font-weight:700"><select id="ic" style="width:96px"><option>EUR</option><option>IDR</option><option>USD</option></select></div>
      <input id="ino" placeholder="Nota: ETF, crypto, ahorro..." style="margin-bottom:14px">
      <button class="btn btn-p" onclick="const a=document.getElementById('ia').value;if(!a||isNaN(+a))return;S.ai({id:Date.now()+'',amt:+a,cur:document.getElementById('ic').value,note:document.getElementById('ino').value,date:td(),uid:D.user});document.getElementById('ia').value='';document.getElementById('ino').value=''">Añadir aportación</button>
    </div>
    ${myInv.length>0?`<div class="slbl">Historial</div><div class="card">${myInv.map(i=>`<div class="lrow"><div class="lic" style="background:var(--al)">📈</div><div class="ltx"><div class="ltx-t">${i.note||'Aportación'}</div><div class="ltx-s"><span>${i.date}</span></div></div><div class="lamt"><div class="lamt-t" style="color:var(--a)">+${cf(i.amt,i.cur)}</div></div></div>`).join('')}</div>`:''}`;
}

function rCfg() {
  const me=D.user,u=D.users[me];
  return `
    <div style="margin-bottom:18px"><div style="font-size:22px;font-weight:700">Ajustes</div><div style="font-size:13px;color:var(--t3);margin-top:3px">Tu configuración personal</div></div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div style="width:44px;height:44px;border-radius:22px;background:${u.bg};color:${u.col};font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center">${u.ini}</div>
        <div><div style="font-size:17px;font-weight:700;color:${u.col}">${u.name}</div><div style="font-size:13px;color:var(--t3)">Usuario activo</div></div>
      </div>
      <div class="fi"><div class="fi-l">Ingresos mensuales</div><div style="display:flex;gap:10px;align-items:center"><input type="number" id="mi" value="${u.inc}"><span style="color:var(--t3);font-size:14px;white-space:nowrap">€/mes</span></div></div>
      <div class="fi"><div class="fi-l">Email para avisos</div><input type="email" id="me2" value="${u.email||''}" placeholder="tu@email.com"></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-weight:700;margin-bottom:16px">Tu regla de presupuesto</div>
      ${[['needs','Necesidades','#2563EB'],['wants','Deseos','#D97706'],['saves','Ahorro / Inv.','#0D9488']].map(([k,l,c])=>`<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><span style="font-size:14px;color:${c};font-weight:700;width:120px">${l}</span><input type="number" id="mr-${k}" value="${(u.rule||{needs:50,wants:30,saves:20})[k]}" style="width:70px;text-align:center;padding:10px"><span style="font-size:13px;color:var(--t3)">%</span></div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-weight:700;margin-bottom:16px">Tipos de cambio</div>
      ${[['IDR','Rupia indonesia'],['USD','Dólar US']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:13px;color:var(--t2);white-space:nowrap;width:72px">1 EUR =</span><input type="number" id="rt-${c}" value="${D.rates[c]}"><span style="font-size:13px;color:var(--t3);width:36px">${c}</span></div>`).join('')}
    </div>
    <button class="btn btn-p" id="sb" onclick="
      const inc=+(document.getElementById('mi')?.value||D.users['${me}'].inc);
      const email=document.getElementById('me2')?.value||'';
      const rule={needs:+(document.getElementById('mr-needs')?.value||50),wants:+(document.getElementById('mr-wants')?.value||30),saves:+(document.getElementById('mr-saves')?.value||20)};
      const rates={IDR:+(document.getElementById('rt-IDR')?.value||17500),USD:+(document.getElementById('rt-USD')?.value||1.08)};
      S.saveSettings(inc,email,rule,rates);
      const b=document.getElementById('sb');if(b){b.textContent='✓ Guardado';b.style.background='var(--gr)';setTimeout(()=>{b.textContent='Guardar cambios';b.style.background='var(--a)'},2000)};
    ">Guardar cambios</button>`;
}

// ── Auth & Init ────────────────────────────────────────────────────────────
function logout() {
  D.user=null;
  G('main').style.display='none';
  G('login').style.display='flex';
}

function showLogin() {
  G('loading').style.display='none';
  G('login').style.display='flex';
  G('login-profiles').innerHTML = Object.entries(D.users).map(([id,u])=>`
    <button class="profile-btn" onclick="selectUser('${id}')">
      <div class="profile-av" style="background:${u.bg};color:${u.col}">${u.ini}</div>
      <div class="profile-info">
        <div class="profile-name">${u.name}</div>
        <div class="profile-sub">${ef(u.inc)}/mes · regla ${u.rule.needs}/${u.rule.wants}/${u.rule.saves}</div>
      </div>
    </button>`).join('');
}

function selectUser(id) {
  D.user=id;
  G('login').style.display='none';
  G('main').style.display='flex';
  G('main').style.flexDirection='column';
  S.r();
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadAll();
    subscribeRealtime();
  } catch(e) {
    console.error('Init error', e);
  }
  showLogin();
})();
</script>
</body>
</html>
